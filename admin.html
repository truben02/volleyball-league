<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/supabase-js@2"></script>
  <script type="module" src="./js/admin.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans p-6">
  <h1 class="text-3xl font-bold mb-6 text-center">Admin Panel</h1>

  <!-- Login Section -->
  <div id="login-section" class="max-w-md mx-auto space-y-4">
    <input id="email" type="email" placeholder="Email" class="w-full p-2 border rounded"/>
    <input id="password" type="password" placeholder="Password" class="w-full p-2 border rounded"/>
    <button id="login-btn" class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
    <p id="login-error" class="text-red-500 text-sm"></p>
  </div>

  <!-- Admin Controls (hidden until login) -->
  <div id="admin-controls" class="hidden max-w-3xl mx-auto space-y-6">
    <h2 class="text-xl font-bold">League Controls</h2>

    <div class="space-y-2">
      <button id="advance-week-btn" class="bg-green-600 text-white p-2 rounded">Advance Week</button>
      <button id="reset-league-btn" class="bg-red-600 text-white p-2 rounded">Reset League</button>
    </div>

    <div id="teams-container" class="space-y-4">
      <h3 class="font-bold text-lg">Teams</h3>
      <!-- Admin will set names, pools, ranks, and toggle absence here -->
    </div>
  </div>
</body>
</html>
